<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warriors Arena - Split-Score & Sync Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --border-ui: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: #0b0f19;
            color: #e5e7eb;
            font-family: system-ui, -apple-system, sans-serif;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex justify-between items-center border-b border-[var(--border-ui)] pb-4">
            <h1 class="text-2xl font-bold tracking-wider text-indigo-400">WARRIORS ARENA</h1>
            <div class="text-sm text-gray-400">SSC CGL Prep Sync</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-slate-900/50 p-4 rounded-xl border border-[var(--border-ui)]">
                <h3 class="text-gray-400 text-sm font-semibold mb-3">LIVE BATTLEGROUNDS</h3>
                <div id="live-battleground-users" class="space-y-2 text-sm">
                    <p class="text-gray-500 italic">Waiting for pipeline connection...</p>
                </div>
            </div>

            <div class="md:col-span-2 bg-slate-900/50 p-4 rounded-xl border border-[var(--border-ui)] h-80 relative">
                <canvas id="radar-canvas-element"></canvas>
            </div>
        </div>
    </div>

    <div id="modal-shroud-container" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 z-50">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-6 space-y-4 shadow-2xl">
            <div class="space-y-1">
                <h2 class="text-xl font-bold text-gray-100">Establish Connection Pipeline</h2>
                <p class="text-xs text-gray-400">Initialize direct cloud synchronization mapping vectors.</p>
            </div>
            
            <form class="space-y-3 text-sm">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">SUPABASE REST ENDPOINT URL</label>
                    <input id="supabase-url-input" type="url" value="https://covwtpfbrafexmiidluo.supabase.co" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-gray-200 focus:outline-none focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">SUPABASE PUBLIC ANON API KEY TOKEN</label>
                    <input id="supabase-key-input" type="text" placeholder="eyJhbGciOiJIUzI1NiIsIn..." class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-gray-200 focus:outline-none focus:border-indigo-500">
                </div>
                
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">YOUR IDENTITY PROFILE NAME</label>
                    <input id="username-input" type="text" placeholder="Ajay" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-gray-200 focus:outline-none focus:border-indigo-500">
                </div>

                <button id="establish-pipeline-btn" type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 transition text-white font-bold py-2.5 rounded-lg tracking-wide text-xs mt-2 cursor-pointer">
                    ESTABLISH PIPELINE
                </button>
            </form>
        </div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
